# Two children with a shared household fund.
# Older child targets private school, younger targets public in-state.
# Run with: collegeplan solve examples/two_kids.yaml

assumptions:
  expected_return_nominal: 0.07
  general_inflation: 0.03

children:
  - name: Older
    current_age: 10
    start_age: 18
    attendance_years: 4
    current_529_balance: 30000
    annual_contribution: 5000
    cost_profile:
      label: Private (4-year)
      current_total_cost: 65000
      annual_cost_growth: 0.05

  - name: Younger
    current_age: 6
    start_age: 18
    attendance_years: 4
    current_529_balance: 10000
    annual_contribution: 3000
    cost_profile:
      label: Public In-State (4-year)
      current_total_cost: 28000
      annual_cost_growth: 0.04

household_fund:
  shared_balance: 20000
  shared_annual_contribution: 5000
  allocation_policy: proportional_to_need

solve:
  target_funding_ratio: 1.0
  solve_mode: child_level
