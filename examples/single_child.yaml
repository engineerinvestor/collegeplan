# Single child headed to a private university.
# Run with: collegeplan solve examples/single_child.yaml

assumptions:
  expected_return_nominal: 0.07
  general_inflation: 0.03

children:
  - name: Alice
    current_age: 5
    start_age: 18
    attendance_years: 4
    current_529_balance: 25000
    annual_contribution: 6000
    cost_profile:
      label: Private (4-year)
      current_total_cost: 65000
      annual_cost_growth: 0.05

solve:
  target_funding_ratio: 1.0
  solve_mode: child_level
